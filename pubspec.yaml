name: woncheon_youth
description: "Woncheon Youth App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  flutter_secure_storage: ^9.2.4

  # Utilities
  intl: ^0.20.2
  dio: ^5.9.2
  fluentui_system_icons: ^1.1.273
  shared_preferences: ^2.5.5
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.2
  app_settings: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^7.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

flutter_native_splash:
  # Serene 팔레트와 일치 — Flutter SplashPage로 자연스럽게 이어지게
  color: "#F4F1EB"
  color_dark: "#16140F"
  image: assets/images/woncheon_lgo.png
  image_dark: assets/images/woncheon_lgo.png
  ios: true
  android: true
  web: false
